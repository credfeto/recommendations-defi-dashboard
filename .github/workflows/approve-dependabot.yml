--- # Dependabot: approve dependency updates
name: "Dependabot: Approve updates"
on:
  # https://securitylab.github.com/research/github-actions-preventing-pwn-requests
  # could and should work, at least for public repos;
  # tracking issue for this action's issue:
  # https://github.com/ahmadnassri/action-dependabot-auto-merge/issues/60
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - main

permissions:
  contents: read


jobs:
  requirements:
    if: vars.DEPENDABOT_AUTOMERGE == 'true' && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: "Check Required Secrets"
        shell: bash
        run: |
          if [ -z "${{secrets.SOURCE_PUSH_TOKEN}}" ]; then
            echo "::error::SOURCE_PUSH_TOKEN is required but not set"
            exit 1
          fi

  enable-auto-merge:
    needs: [requirements]
    if: |-
      vars.DEPENDABOT_AUTOMERGE == 'true' &&
      github.actor == 'dependabot[bot]' &&
      (startsWith(github.head_ref, 'dependabot/github_actions/') || startsWith(github.head_ref, 'dependabot/npm_and_yarn/'))
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    # Specifically check that dependabot (or another trusted party) created this pull-request, and that it has been labelled correctly.
    # Note: pull_request_target workflows cannot use local composite actions — GitHub resolves local action paths at job
    # initialisation before any steps run (workspace is empty). Scripts are therefore inlined here instead.

    steps:
      - name: "Initialise Workspace"
        if: runner.environment == 'self-hosted'
        shell: bash
        run: sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE"

      - name: "Set Active Environment"
        shell: bash
        run: |
          {
            echo "ACTIVE_RUNNER_NAME=${{runner.name}}"
            echo "ACTIVE_HOSTNAME=$HOSTNAME"
            echo "ACTIVE_USER=$USER"
          } >> "$GITHUB_ENV"

      - name: "Enable Auto-Merge"
        uses: actions/github-script@v9.0.0
        with:
          github-token: ${{secrets.SOURCE_PUSH_TOKEN}}
          script: |
            const mergeMethod = process.env.MERGE_METHOD;
            const nodeId = context.payload.pull_request.node_id;
            await github.graphql(`
              mutation EnableAutoMerge($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: $mergeMethod
                }) {
                  pullRequest {
                    autoMergeRequest {
                      mergeMethod
                    }
                  }
                }
              }
            `, {
              pullRequestId: nodeId,
              mergeMethod: mergeMethod,
            });
            core.info(`✅ Enabled auto-merge (${mergeMethod}) on PR #${context.payload.pull_request.number}`);
            core.notice(`Enabled auto-merge (${mergeMethod}) on PR #${context.payload.pull_request.number}`);
        env:
          MERGE_METHOD: "MERGE"

  auto-approve-dependabot:
    needs: [requirements]
    if: |-
      vars.DEPENDABOT_AUTOMERGE == 'true' &&
      github.actor == 'dependabot[bot]' &&
      (startsWith(github.head_ref, 'dependabot/github_actions/') || startsWith(github.head_ref, 'dependabot/npm_and_yarn/'))
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    # Note: pull_request_target workflows cannot use local composite actions — GitHub resolves local action paths at job
    # initialisation before any steps run (workspace is empty). Scripts are therefore inlined here instead.

    steps:
      - name: "Initialise Workspace"
        if: runner.environment == 'self-hosted'
        shell: bash
        run: sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE"

      - name: "Set Active Environment"
        shell: bash
        run: |
          {
            echo "ACTIVE_RUNNER_NAME=${{runner.name}}"
            echo "ACTIVE_HOSTNAME=$HOSTNAME"
            echo "ACTIVE_USER=$USER"
          } >> "$GITHUB_ENV"

      - name: "Approve PR"
        uses: actions/github-script@v9.0.0
        with:
          github-token: ${{secrets.SOURCE_PUSH_TOKEN}}
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
            });
            core.info(`✅ Approved PR #${context.payload.pull_request.number}`);
            core.notice(`Approved PR #${context.payload.pull_request.number}`);
