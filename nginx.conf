server {
    listen 443 ssl;
    server_name defi.local localhost;

    ssl_certificate     /etc/nginx/certs/defi.crt;
    ssl_certificate_key /etc/nginx/certs/defi.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Proxy /api/* to Fastify backend
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Hashed assets — long-lived immutable cache
    location ~* "^/assets/.*\.[0-9a-f]{8,}\.(js|css|woff2?|png|svg|ico)$" {
        root /app/client;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Other static files — 1 hour cache
    location / {
        root /app/client;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri /index.html;
    }
}
